<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Vida • v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--accent:#0f766e;--text:#0f172a;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(248,250,252,0.95);backdrop-filter:blur(20px);z-index:100;box-shadow:0 4px 20px -2px rgb(15 118 110 / 0.1);}
.logo{font-family:'DM Serif Display',serif;font-size:1.55rem;letter-spacing:-0.03em;}
.profile-photo{width:42px;height:42px;border-radius:9999px;background:url('https://picsum.photos/id/1005/200/200') center/cover;border:3px solid #fff;box-shadow:0 0 0 4px #0f766e;transition:all 0.3s;}
.profile-photo:hover{transform:scale(1.08);}
.nav-tab{padding:9px 20px;border-radius:9999px;font-weight:600;transition:all 0.25s;}
.nav-tab.active{background:#0f766e;color:#fff;}
.card{border-radius:20px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.05);}
</style>
</head>
<body>

<header class="header">
  <div class="logo">vida<span>.</span>dashboard <span class="text-sm font-medium text-teal-600">v3</span></div>
  
  <nav class="flex gap-2 bg-white border border-slate-200 rounded-3xl p-1 shadow-sm">
    <button class="nav-tab active px-6 py-2 text-sm" onclick="showPage('dashboard')">🏠 Dashboard</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('gsuite')">☁️ Centro de Mando</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('news')">📰 Noticias</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('recipes')">🍳 Recetario</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('supermarket')">🛒 Supermercado</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('voice')">🎙️ Notas de Voz</button>
  </nav>

  <div class="flex items-center gap-6">
    <span id="dateDisplay" class="font-mono text-sm text-slate-500"></span>
    
    <!-- TU FOTO AQUÍ -->
    <div onclick="alert('¡Hola Layra! 👋 (aquí irá tu perfil completo)')" class="profile-photo cursor-pointer"></div>
    
    <button onclick="toggleFocus()" class="flex items-center gap-2 bg-white border border-slate-200 hover:border-teal-600 text-slate-700 px-5 py-2 rounded-3xl text-sm font-medium">
      <span class="w-3 h-3 bg-teal-500 rounded-full animate-pulse"></span>
      Modo Enfoque
    </button>
  </div>
</header>

<!-- TODO EL CONTENIDO ORIGINAL DE TU DASHBOARD (se mantiene exactamente igual) -->

// Solo añadimos esta pequeña función para que las pestañas funcionen con el nuevo header
const pageIds = ['dashboard','gsuite','news','recipes','supermarket','voice'];
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  // activar el botón correcto
  const tabs = document.querySelectorAll('.nav-tab');
  for(let i=0; i<tabs.length; i++){
    if(pageIds[i] === id) tabs[i].classList.add('active');
  }
}

// Inicializar fecha y todo lo demás
function updateDate() {
  const d = new Date();
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('es-ES', {weekday:'short', day:'numeric', month:'short'}).toUpperCase();
}
window.onload = () => {
  updateDate();
  // tu función init() original
  init();
};
</script>

</html>

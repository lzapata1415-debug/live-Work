<style>
:root{--bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--border:#e2e8f0;--accent:#0f766e;--text:#0f172a;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(248,250,252,0.95);backdrop-filter:blur(20px);z-index:100;box-shadow:0 4px 20px -2px rgb(15 118 110 / 0.1);}
.logo{font-family:'DM Serif Display',serif;font-size:1.55rem;letter-spacing:-0.03em;}
.profile-photo{width:42px;height:42px;border-radius:9999px;background:url('https://picsum.photos/id/1005/200/200') center/cover;border:3px solid #fff;box-shadow:0 0 0 4px #0f766e;transition:all 0.3s;}
.profile-photo:hover{transform:scale(1.08);}
.nav-tab{padding:9px 20px;border-radius:9999px;font-weight:600;transition:all 0.25s;}
.nav-tab.active{background:#0f766e;color:#fff;}
.card{border-radius:20px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.05);}
.page{display:none;}
.page.active{display:block;}
</style>
</head>

<header class="header">

    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('news')">📰 Noticias</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('recipes')">🍳 Recetario</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('supermarket')">🛒 Supermercado</button>
    <button class="nav-tab px-6 py-2 text-sm" onclick="showPage('voice')">🎙️ Notas de Voz</button>
  </nav>

  <div class="flex items-center gap-6">
    <span id="dateDisplay" class="font-mono text-sm text-slate-500"></span>
    <!-- CAMBIA ESTA URL POR TU FOTO REAL -->

const pageIds = ['dashboard','gsuite','news','recipes','supermarket','voice'];
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const index = pageIds.indexOf(id);
  if (index !== -1) document.querySelectorAll('.nav-tab')[index].classList.add('active');
}

function updateDate() {
  const d = new Date();
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('es-ES', {weekday:'short', day:'numeric', month:'short'}).toUpperCase();
}

window.onload = () => {
  updateDate();
  init();           // tu función init original
};
